name: Build & push Docker image

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *" # Every day at 6am UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Get latest upstream commit
        id: upstream
        run: |
          SHA=$(curl -s https://api.github.com/repos/tyrasd/overpass-turbo/commits/master \
            | jq -r '.sha')
          if [ -z "$SHA" ] || [ "$SHA" = "null" ]; then
            echo "Failed to retrieve latest upstream commit" >&2
            exit 1
          fi
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "short_sha=${SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Check if image already exists on Docker Hub
        id: check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://hub.docker.com/v2/repositories/${{ secrets.DOCKERHUB_USERNAME }}/overpass-turbo/tags/${{ steps.upstream.outputs.short_sha }}")
          echo "exists=$([ "$STATUS" = "200" ] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Checkout this repo
        if: steps.check.outputs.exists == 'false'
        uses: actions/checkout@v4
        with:
          path: self

      - name: Clone upstream source
        if: steps.check.outputs.exists == 'false'
        run: |
          git clone --depth 1 https://github.com/tyrasd/overpass-turbo.git build-ctx
          cp self/Dockerfile build-ctx/
          cp self/docker-entrypoint.sh build-ctx/

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.check.outputs.exists == 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: build-ctx
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/overpass-turbo:${{ steps.upstream.outputs.short_sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/overpass-turbo:latest
